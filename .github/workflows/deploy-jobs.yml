name: Deploy Jobs to GitHub Pages

on:
  workflow_dispatch:   # 手動実行

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Write service account key
        run: echo '${{ secrets.SERVICE_ACCOUNT_KEY }}' > .github/scripts/service-account.json

      - name: Install dependencies
        run: npm install
        working-directory: .github/scripts

      - name: Fetch Jobs from Google Sheets
        run: node fetchJobs.mjs
        working-directory: .github/scripts
        env:
          SHEET_ID: ${{ secrets.SHEET_ID }}

      - name: Generate Markdown
        run: node generateMarkdown.mjs
        working-directory: .github/scripts

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Build Jekyll site
        run: bundle exec jekyll build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>案件詳細</title>
  <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
  <script src="{{ '/assets/js/env.js' | relative_url }}"></script>
  <script>
    window.MENU_TALENT_ROUTES = {
      login: "{{ '/' | relative_url }}",
      jobs: "{{ '/jobs/' | relative_url }}"
    };
  </script>
</head>
<body data-page="job">
  <main class="job-page">
    <section class="job-stage">
      <section class="job-thumbnail-wrap">
        <div id="job-thumbnail" class="job-thumbnail job-thumbnail--placeholder" aria-label="案件サムネイル">
          <span>NO IMAGE</span>
        </div>
      </section>

      <section class="job-hero">
        <div class="job-hero__panel">
          <p id="job-kicker" class="job-kicker">Casting Opportunity</p>
          <h1 id="job-title">案件詳細を読み込み中...</h1>
          <p id="job-hero-summary" class="job-hero-summary">条件と募集内容を確認してください。</p>

          <div class="job-highlight-grid" aria-label="案件ハイライト">
            <div class="job-highlight-card">
              <span class="job-highlight-card__label">報酬</span>
              <strong id="job-hero-reward" class="job-highlight-card__value">-</strong>
            </div>
            <div class="job-highlight-card">
              <span class="job-highlight-card__label">実施日</span>
              <strong id="job-hero-date" class="job-highlight-card__value">-</strong>
            </div>
            <div class="job-highlight-card">
              <span class="job-highlight-card__label">場所</span>
              <strong id="job-hero-location" class="job-highlight-card__value">-</strong>
            </div>
            <div class="job-highlight-card">
              <span class="job-highlight-card__label">残り日数</span>
              <strong id="job-hero-remaining" class="job-highlight-card__value">未定</strong>
            </div>
          </div>

          <div class="job-hero-actions">
            <button id="apply-button" data-job-id="{{ page.job_id | default: '' }}">応募する</button>
            <a class="back-link" href="{{ '/jobs/' | relative_url }}">案件一覧に戻る</a>
          </div>
        </div>
      </section>
    </section>

    <section class="job-content">
      <section class="job-section-card">
        <div class="job-section-heading">
          <p class="job-section-heading__eyebrow">Overview</p>
          <h2>募集条件</h2>
        </div>
        <div class="job-detail-list">
          <div class="job-detail-item"><span class="job-detail-label">拘束時間</span><span id="job-duration">-</span></div>
          <div class="job-detail-item"><span class="job-detail-label">時給</span><span id="job-hourly-wage">-</span></div>
          <div class="job-detail-item"><span class="job-detail-label">募集人数</span><span id="job-recruitment-number">-</span></div>
        </div>
      </section>

      <section class="job-section-card">
        <div class="job-section-heading">
          <p class="job-section-heading__eyebrow">Creative</p>
          <h2>撮影内容</h2>
        </div>
        <div class="job-detail-list">
          <div class="job-detail-item"><span class="job-detail-label">案件説明</span><span id="job-description" class="job-applicants-list">-</span></div>
          <div class="job-detail-item"><span class="job-detail-label">コンセプト</span><span id="job-concept" class="job-applicants-list">-</span></div>
          <div class="job-detail-item"><span class="job-detail-label">媒体</span><span id="job-media">-</span></div>
          <div class="job-detail-item"><span class="job-detail-label">使用期間</span><span id="job-usage-period">-</span></div>
          <div class="job-detail-item"><span class="job-detail-label">競合</span><span id="job-competition">-</span></div>
        </div>
      </section>

      <section class="job-section-card">
        <div class="job-section-heading">
          <p class="job-section-heading__eyebrow">Application</p>
          <h2>応募条件</h2>
        </div>
        <div class="job-detail-list">
          <div class="job-detail-item"><span class="job-detail-label">応募条件</span><span id="job-requirements" class="job-applicants-list">-</span></div>
          <div class="job-detail-item"><span class="job-detail-label">メイク・ヘアメイクの有無</span><span id="job-makeup-support">-</span></div>
          <div class="job-detail-item"><span class="job-detail-label">持ち物</span><span id="job-belongings" class="job-applicants-list">-</span></div>
          <div class="job-detail-item"><span class="job-detail-label">選考方法</span><span id="job-selection-method">-</span></div>
        </div>
      </section>

      <div class="job-apply">
        <button id="apply-button-bottom" data-apply-trigger="true" type="button">この案件に応募する</button>
        <a class="back-link" href="{{ '/jobs/' | relative_url }}">案件一覧に戻る</a>
      </div>
    </section>

    <div id="apply-confirm-modal" class="apply-confirm-modal hidden" role="dialog" aria-modal="true" aria-labelledby="apply-confirm-title">
      <div class="apply-confirm-modal__backdrop" data-close-modal="true"></div>
      <div class="apply-confirm-modal__panel">
        <h2 id="apply-confirm-title">応募内容の最終確認</h2>
        <p class="apply-confirm-modal__text">応募確定前に以下を確認してください。</p>
        <div class="apply-confirm-modal__pdf-frame">
          <iframe src="{{ '/assets/docs/cancel-policy.pdf' | relative_url }}" title="キャンセルポリシーPDFプレビュー" aria-label="キャンセルポリシーPDFプレビュー"></iframe>
        </div>
        <div class="job-consents">
          <label class="job-consent">
            <input type="checkbox" id="modal-consent-cancel-policy">
            <span>キャンセルポリシー（PDFプレビュー）を確認しました</span>
          </label>
        </div>
        <div class="apply-confirm-modal__actions">
          <button type="button" id="cancel-apply-confirm" class="details-button">戻る</button>
          <button type="button" id="confirm-apply-button" class="apply-button">応募確定に進む</button>
        </div>
      </div>
    </div>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const button = document.getElementById("apply-button");
      const secondaryApplyButton = document.getElementById("apply-button-bottom");
      const modal = document.getElementById("apply-confirm-modal");
      const modalCancelPolicyCheckbox = document.getElementById("modal-consent-cancel-policy");
      const cancelConfirmButton = document.getElementById("cancel-apply-confirm");
      const confirmApplyButton = document.getElementById("confirm-apply-button");
      if (!button) return;

      const pageJobId = String(button.dataset.jobId || "").trim();
      const queryJobId = new URLSearchParams(window.location.search).get("jobId") || "";
      const jobId = pageJobId || String(queryJobId).trim();
      const apiUrl = window.MENU_TALENT_API_URL || "";
      const apiTimeoutMs = Number(window.MENU_TALENT_API_TIMEOUT_MS || 15000);

      if (!apiUrl) {
        alert("API設定が未完了です。env.js を確認してください。");
        return;
      }

      function jsonpRequest(params, timeoutMs) {
        return new Promise((resolve, reject) => {
          const cbName = "menuTalentCb_" + Date.now() + "_" + Math.floor(Math.random()*1e6);
          const script = document.createElement("script");
          const timer = setTimeout(() => { cleanup(); reject(new Error("timeout")); }, timeoutMs);
          function cleanup() { clearTimeout(timer); delete window[cbName]; if(script.parentNode) script.parentNode.removeChild(script); }
          window[cbName] = (data) => { cleanup(); resolve(data); };
          const qs = new URLSearchParams({ ...params, callback: cbName });
          script.src = apiUrl + "?" + qs.toString();
          script.onerror = () => { cleanup(); reject(new Error("script load error")); };
          document.head.appendChild(script);
        });
      }

      function readableApiError(response) {
        const code = String(response?.errorCode || response?.code || "");
        if (code === "already_applied") return "この案件には既に応募済みです。";
        if (code === "consent_required") return "キャンセルポリシーの確認が必要です。";
        if (code === "quota_full") return "応募人数が上限に達しています。";
        if (code === "deadline_passed") return "応募締切を過ぎたため応募できません。";
        if (code === "forbidden") return "この操作を実行する権限がありません。";
        if (code === "invalid_email") return "確認メール送信先のメールアドレスが不正です。";
        return String(response?.message || "処理に失敗しました。");
      }

      function hasRequiredConsents() {
        return Boolean(modalCancelPolicyCheckbox?.checked);
      }

      function openConfirmModal() {
        if (!modal) return;
        modal.classList.remove("hidden");
      }

      function closeConfirmModal() {
        if (!modal) return;
        modal.classList.add("hidden");
      }

      function setText(id, value) {
        const el = document.getElementById(id);
        if (!el) return;
        const text = value === undefined || value === null ? "" : String(value).trim();
        
        if (!text) {
          // 親の.job-detail-itemを非表示にする
          const itemEl = el.closest(".job-detail-item");
          if (itemEl) itemEl.style.display = "none";
        } else {
          el.textContent = text;
        }
      }

      function pickFirst(...values) {
        for (const value of values) {
          const text = value === undefined || value === null ? "" : String(value).trim();
          if (text) return text;
        }
        return "";
      }

      function setTextOrFallback(id, value, fallback) {
        const el = document.getElementById(id);
        if (!el) return;
        const text = value === undefined || value === null ? "" : String(value).trim();
        el.textContent = text || fallback;
      }

      function escapeHtml(text) {
        return String(text || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function extractDriveFileId(text) {
        const raw = String(text || "").trim();
        if (!raw) return "";

        const m1 = raw.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
        if (m1 && m1[1]) return m1[1];

        const m2 = raw.match(/\/d\/([a-zA-Z0-9_-]+)/);
        if (m2 && m2[1]) return m2[1];

        const m3 = raw.match(/[?&]id=([a-zA-Z0-9_-]+)/);
        if (m3 && m3[1]) return m3[1];

        return "";
      }

      function normalizeYouTubeEmbedUrl(rawUrl) {
        const raw = String(rawUrl || "").trim();
        if (!raw) return "";

        const short = raw.match(/^https?:\/\/youtu\.be\/([a-zA-Z0-9_-]{6,})/i);
        if (short && short[1]) {
          return `https://www.youtube.com/embed/${short[1]}`;
        }

        const normal = raw.match(/[?&]v=([a-zA-Z0-9_-]{6,})/i);
        if (normal && normal[1]) {
          return `https://www.youtube.com/embed/${normal[1]}`;
        }

        const embed = raw.match(/^https?:\/\/(?:www\.)?youtube\.com\/embed\/([a-zA-Z0-9_-]{6,})/i);
        if (embed && embed[1]) {
          return `https://www.youtube.com/embed/${embed[1]}`;
        }

        return "";
      }

      function resolveThumbnailMediaSource(job) {
        const raw = pickFirst(
          job.thumbnail_url,
          job.eyecatch_image,
          job.eyecatch_url,
          job.eye_catch_image,
          job.eye_catch_url,
          job.image,
          job.video_url,
          job.movie_url,
          job.video,
          job.media_url,
          job.media,
          job.file_url,
          job["画像"],
          job["画像URL"],
          job["動画"],
          job["動画URL"],
          job["画像・動画"],
          job["画像・動画URL"]
        );

        const url = String(raw || "").trim();
        if (!url) {
          return { type: "none", url: "" };
        }

        const yt = normalizeYouTubeEmbedUrl(url);
        if (yt) {
          return { type: "iframe", url: yt };
        }

        if (/^https?:\/\/drive\.google\.com\//i.test(url)) {
          const driveId = extractDriveFileId(url);
          if (driveId) {
            return { type: "iframe", url: `https://drive.google.com/file/d/${driveId}/preview` };
          }
        }

        if (/\.(mp4|webm|ogg|mov|m4v)(?:$|[?#])/i.test(url)) {
          return { type: "video", url };
        }

        if (/\.(png|jpe?g|gif|webp|avif|svg)(?:$|[?#])/i.test(url)) {
          return { type: "image", url };
        }

        return { type: "image", url };
      }

      function calculateRemainingDays(deadline) {
        if (!deadline) return "未定";
        const raw = String(deadline).trim();
        if (/^残り\s*\d+\s*日$/.test(raw)) return raw.replace(/\s+/g, "");
        if (/^\d+\s*日$/.test(raw)) return `残り${raw.replace(/\s+/g, "")}`;
        const today = new Date();
        const d = new Date(deadline);
        if (isNaN(d.getTime())) return "未定";
        const diffMs = d.setHours(0,0,0,0) - today.setHours(0,0,0,0);
        const diffDays = Math.ceil(diffMs / (1000 * 60 * 60 * 24));
        if (diffDays < 0) return "期限切れ";
        return `残り${diffDays}日`;
      }

      function formatImplementationDate(value) {
        const raw = value === undefined || value === null ? "" : String(value).trim();
        if (!raw) return "";

        const jpDateMatch = raw.match(/(\d{4})\D+(\d{1,2})\D+(\d{1,2})/);
        if (jpDateMatch) {
          const month = Number(jpDateMatch[2]);
          const day = Number(jpDateMatch[3]);
          if (Number.isFinite(month) && Number.isFinite(day)) {
            return `${month}月${day}日`;
          }
        }

        const normalized = raw.replace(/\./g, "-").replace(/\//g, "-");
        const parsed = new Date(normalized);
        if (!Number.isNaN(parsed.getTime())) {
          return `${parsed.getMonth() + 1}月${parsed.getDate()}日`;
        }

        return raw;
      }

      function renderJob(job) {
        // 報酬総額
        const totalRewardValue = pickFirst(job.total_reward, job.totalReward, job.fee, job.reward, job["報酬"]);
        const totalRewardNumber = Number(totalRewardValue);
        const totalReward = Number.isFinite(totalRewardNumber)
          ? `${totalRewardNumber.toLocaleString()}円（交通費込）`
          : (totalRewardValue || "-");
        
        // 拘束時間（分離）
        const duration = pickFirst(job.duration, job["拘束時間"], job["拘束時間(時間)"]);
        
        // 時給（分離）
        const hourlyWageValue = pickFirst(job.hourly_wage, job.hourlyWage, job.wage, job["時給"]);
        const hourlyWageNumber = Number(hourlyWageValue);
        const hourlyWage = Number.isFinite(hourlyWageNumber) ? `${hourlyWageNumber.toLocaleString()}円/時` : hourlyWageValue;
        
        // 実施日時
        const implementationDateRaw = pickFirst(
          job.implementation_date,
          job.execution_date,
          job.date,
          job.schedule,
          job["実施日時"],
          job["日時"]
        );
        const implementationDate = formatImplementationDate(implementationDateRaw);
        
        // 実施場所
        const location = pickFirst(job.location, job.place, job.venue, job["実施場所"], job["場所"]);
        
        // 応募条件
        const requirements = pickFirst(
          job.requirements,
          job.qualifications,
          job.conditions,
          job["応募条件"],
          job["条件"]
        );
        
        // 募集人数
        const recruitmentNumber = pickFirst(
          job.recruitment_number,
          job.number_of_applicants,
          job.max_applicants,
          job["募集人数"],
          job["人数"]
        );
        
        // 案件説明
        const description = pickFirst(job.description, job.details, job.shooting_content, job["案件説明"]);
        
        // コンセプト
        const concept = pickFirst(job.concept, job.concept_line, job["コンセプト"]);
        
        // メイク・ヘアメイク
        const makeupSupport = pickFirst(
          job.makeup_staff,
          job.hair_makeup_staff,
          job.make_hair_makeup,
          job["メイク・ヘアメイクの有無"],
          job["メイク・ヘアメイクスタッフの有無"]
        );
        
        // 持ち物
        const belongings = pickFirst(job.belongings, job["持ち物"]);
        
        // 媒体
        const media = pickFirst(job.media, job.medium, job["媒体"]);
        
        // 使用期間
        const usagePeriod = pickFirst(job.usage_period, job.period, job["使用期間"]);
        
        // 競合
        const competition = pickFirst(job.competition, job.conflict, job["競合"]);
        
        // 残り日数
        const remainingSource = pickFirst(job.remaining, job["残り日数"], job.deadline);
        const remainingDays = calculateRemainingDays(remainingSource);
        
        // 選考方法
        const selectionMethod = pickFirst(job.selection_method, job.selection_process, job.method, job["選考方法"]);
        
        // サムネイル（画像/動画のどちらでも表示）
        const mediaSource = resolveThumbnailMediaSource(job);
        const thumbnailEl = document.getElementById("job-thumbnail");

        // メタセクション表示
        const resolvedTitle = pickFirst(job.title, job.name, job.job_title, "案件詳細");
        const category = pickFirst(job.category, job["カテゴリ"], media);
        const heroSummary = pickFirst(concept, description, requirements, "条件と募集内容を確認してください。");
        setText("job-title", resolvedTitle);
        setTextOrFallback("job-kicker", category, "Casting Opportunity");
        setTextOrFallback("job-hero-summary", heroSummary, "条件と募集内容を確認してください。");
        setTextOrFallback("job-hero-reward", totalReward, "-");
        setTextOrFallback("job-hero-date", implementationDate, "-");
        setTextOrFallback("job-hero-location", location, "-");
        setText("job-hero-remaining", remainingDays);
        document.title = `${resolvedTitle} | 案件詳細`;

        // 詳細セクション表示
        setTextOrFallback("job-total-reward", totalReward, "-");
        setTextOrFallback("job-duration", duration, "-");
        setTextOrFallback("job-hourly-wage", hourlyWage, "-");
        setTextOrFallback("job-implementation-date", implementationDate, "-");
        setTextOrFallback("job-location", location, "-");
        setTextOrFallback("job-requirements", requirements, "-");
        setTextOrFallback("job-recruitment-number", recruitmentNumber, "-");
        setTextOrFallback("job-description", description, "-");
        setTextOrFallback("job-concept", concept, "-");
        setTextOrFallback("job-makeup-support", makeupSupport, "-");
        setTextOrFallback("job-belongings", belongings, "-");
        setTextOrFallback("job-media", media, "-");
        setTextOrFallback("job-usage-period", usagePeriod, "-");
        setTextOrFallback("job-competition", competition, "-");
        setText("job-remaining-days", remainingDays);
        setTextOrFallback("job-selection-method", selectionMethod, "-");

        if (thumbnailEl) {
          const titleEscaped = escapeHtml(String(job.title || "案件サムネイル"));

          if (mediaSource.type === "iframe") {
            thumbnailEl.innerHTML = `<iframe src="${escapeHtml(mediaSource.url)}" title="${titleEscaped}" loading="lazy" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>`;
            thumbnailEl.classList.remove("job-thumbnail--placeholder");
          } else if (mediaSource.type === "video") {
            thumbnailEl.innerHTML = `<video src="${escapeHtml(mediaSource.url)}" controls playsinline preload="metadata"></video>`;
            thumbnailEl.classList.remove("job-thumbnail--placeholder");
          } else if (mediaSource.type === "image") {
            thumbnailEl.innerHTML = `<img src="${escapeHtml(mediaSource.url)}" alt="${titleEscaped}">`;
            thumbnailEl.classList.remove("job-thumbnail--placeholder");
          } else {
            thumbnailEl.innerHTML = "<span>NO IMAGE</span>";
            thumbnailEl.classList.add("job-thumbnail--placeholder");
          }
        }
      }

      async function loadJobDetail() {
        if (!jobId) { alert("案件IDが見つかりません。"); return; }

        try {
          let job = null;

          // 優先: 単一案件APIで転送量を削減して表示を高速化
          const singleData = await jsonpRequest(
            { action: "getJob", jobId },
            apiTimeoutMs
          );

          if (singleData?.ok && singleData.job) {
            job = singleData.job;
          } else if (String(singleData?.errorCode || "") === "invalid_action") {
            // API未反映時の互換フォールバック
            const listData = await jsonpRequest({ action: "listJobs" }, apiTimeoutMs);
            if (!listData.ok) {
              alert(readableApiError(listData));
              return;
            }
            const jobs = Array.isArray(listData.jobs) ? listData.jobs : [];
            job = jobs.find((item) => String(item.job_id || item.id || "") === String(jobId)) || null;
          } else {
            alert(readableApiError(singleData));
            return;
          }

          if (!job) {
            alert("案件が見つかりませんでした。");
            return;
          }

          renderJob(job);
        } catch (err) {
          console.error(err);
          alert("通信エラーが発生しました。時間をおいて再度お試しください。");
        }
      }

      loadJobDetail();

      modal?.addEventListener("click", (event) => {
        const target = event.target;
        if (target instanceof HTMLElement && target.dataset.closeModal === "true") {
          closeConfirmModal();
        }
      });
      cancelConfirmButton?.addEventListener("click", closeConfirmModal);

      [button, secondaryApplyButton].forEach((applyTrigger) => {
        applyTrigger?.addEventListener("click", () => {
          openConfirmModal();
        });
      });

      confirmApplyButton?.addEventListener("click", async () => {
        if (!hasRequiredConsents()) { alert("キャンセルポリシーの確認が必要です。"); return; }

        const applicantName = (window.prompt("応募者名を入力してください") || "").trim();
        if (!applicantName) { alert("応募者名を入力してください。"); return; }

        const contactEmail = window.prompt("確認メールの送信先メールアドレスを入力してください");
        if (!contactEmail || !contactEmail.trim()) { alert("メールアドレスを入力してください。"); return; }
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(contactEmail.trim())) { alert("正しいメールアドレスを入力してください。"); return; }

        confirmApplyButton.disabled = true;

        try {
          const payload = {
            action: "apply",
            jobId,
            applicantName,
            contactEmail: contactEmail.trim(),
            acceptedCancelPolicy: "true"
          };

          const data = await jsonpRequest(payload, apiTimeoutMs);

          if (!data.ok) {
            alert(readableApiError(data));
            confirmApplyButton.disabled = false;
            return;
          }

          alert("応募が完了しました。確認メールをご確認ください。");
          closeConfirmModal();
          modalCancelPolicyCheckbox.checked = false;
          confirmApplyButton.disabled = false;

          // 最新の案件情報を再取得して応募者リストを更新
          await loadJobDetail();

        } catch (err) {
          console.error(err);
          alert("通信エラーが発生しました。時間をおいて再度お試しください。");
          confirmApplyButton.disabled = false;
        }
      });
    });
  </script>
</body>
</html>

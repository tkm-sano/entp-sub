<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | 案件詳細</title>
  <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
  <script src="{{ '/assets/js/env.js' | relative_url }}"></script>
  <script>
    window.MENU_TALENT_ROUTES = {
      login: "{{ '/' | relative_url }}",
      jobs: "{{ '/jobs/' | relative_url }}"
    };
  </script>
</head>
<body data-page="job">
  <main class="job-page">
    <section class="job-thumbnail-wrap">
      <div id="job-thumbnail" class="job-thumbnail job-thumbnail--placeholder" aria-label="案件サムネイル">
        <span>NO IMAGE</span>
      </div>
    </section>

    <!-- メタセクション（ヘッダー） -->
    <!-- 対応: title, category, deadline -->
    <section class="job-hero">
      <h1 id="job-title">{{ page.title }}</h1>
      <div class="job-meta">
        <span>カテゴリー: <span id="job-category">未記載</span></span>
        <span>残り: <span id="job-remaining-days">未定</span></span>
      </div>
    </section>

    <!-- 詳細セクション -->
    <!-- 対応: title, category, deadline, hourly_wage, fee, max_applicants, applicant_count -->
    <section class="job-content">
      <div class="job-detail-list">
        <div class="job-detail-item"><span class="job-detail-label">案件名:</span> <span id="job-title-detail">未記載</span></div>
        <div class="job-detail-item"><span class="job-detail-label">カテゴリ:</span> <span id="job-category-detail">未記載</span></div>
        <div class="job-detail-item"><span class="job-detail-label">残り:</span> <span id="job-remaining-days-detail">未定</span></div>
        <div class="job-detail-item"><span class="job-detail-label">時給:</span> <span id="job-hourly-wage">未設定</span></div>
        <div class="job-detail-item"><span class="job-detail-label">ギャラ:</span> <span id="job-fee">未記載</span></div>
        <div class="job-detail-item"><span class="job-detail-label">募集人数:</span> <span id="job-max-applicants">-</span></div>
        <div class="job-detail-item"><span class="job-detail-label">現在申し込まれている人数:</span> <span id="job-applicant-count">-</span></div>
      </div>

      <div class="job-apply">
        <button id="apply-button" data-job-id="{{ page.job_id }}">応募する</button>
        <a class="back-link" href="{{ '/jobs/' | relative_url }}">案件一覧に戻る</a>
      </div>
    </section>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const button = document.getElementById("apply-button");
      if (!button) return;

      const jobId = button.dataset.jobId;
      const apiUrl = window.MENU_TALENT_API_URL || "";
      const apiTimeoutMs = Number(window.MENU_TALENT_API_TIMEOUT_MS || 15000);
      const routes = window.MENU_TALENT_ROUTES || { login: "/", jobs: "/jobs/" };
      const sessionKey = "menuTalentSessionV1";

      if (!apiUrl) {
        alert("API設定が未完了です。env.js を確認してください。");
        return;
      }

      function loadSession() {
        try { return JSON.parse(sessionStorage.getItem(sessionKey)) || null; } catch { return null; }
      }

      function jsonpRequest(params, timeoutMs) {
        return new Promise((resolve, reject) => {
          const cbName = "menuTalentCb_" + Date.now() + "_" + Math.floor(Math.random()*1e6);
          const script = document.createElement("script");
          const timer = setTimeout(() => { cleanup(); reject(new Error("timeout")); }, timeoutMs);
          function cleanup() { clearTimeout(timer); delete window[cbName]; if(script.parentNode) script.parentNode.removeChild(script); }
          window[cbName] = (data) => { cleanup(); resolve(data); };
          const qs = new URLSearchParams({ ...params, callback: cbName });
          script.src = apiUrl + "?" + qs.toString();
          script.onerror = () => { cleanup(); reject(new Error("script load error")); };
          document.head.appendChild(script);
        });
      }

      function readableApiError(response) {
        const code = String(response?.errorCode || response?.code || "");
        if (code === "invalid_credentials") return "名前またはパスワードが正しくありません。";
        if (code === "invalid_token" || code === "token_expired") return "セッションが無効です。再ログインしてください。";
        if (code === "already_applied") return "この案件には既に応募済みです。";
        if (code === "quota_full") return "応募人数が上限に達しています。";
        if (code === "deadline_passed") return "応募締切を過ぎたため応募できません。";
        if (code === "forbidden") return "この操作を実行する権限がありません。";
        if (code === "invalid_email") return "確認メール送信先のメールアドレスが不正です。";
        return String(response?.message || "処理に失敗しました。");
      }

      function setText(id, value) {
        const el = document.getElementById(id);
        if (!el) return;
        const text = value === undefined || value === null ? "" : String(value).trim();
        
        if (!text) {
          // 親の.job-detail-itemを非表示にする
          const itemEl = el.closest(".job-detail-item");
          if (itemEl) itemEl.style.display = "none";
        } else {
          el.textContent = text;
        }
      }

      function calculateRemainingDays(deadline) {
        if (!deadline) return "未定";
        const today = new Date();
        const d = new Date(deadline);
        if (isNaN(d.getTime())) return "未定";
        const diffMs = d.setHours(0,0,0,0) - today.setHours(0,0,0,0);
        const diffDays = Math.ceil(diffMs / (1000 * 60 * 60 * 24));
        if (diffDays < 0) return "期限切れ";
        return `${diffDays} 日`;
      }

      function renderJob(job) {
        const category = job.category || (Array.isArray(job.tags) ? job.tags.join(", ") : job.tags) || "";
        const maxApplicants = job.max_applicants ?? job.maxApplicants ?? "";
        const applicantCount = job.applicant_count ?? job.applicantCount ?? "";
        const hourlyWageRaw = Number(job.hourly_wage ?? job.hourlyWage);
        const hourlyWage = Number.isFinite(hourlyWageRaw) ? `¥${hourlyWageRaw.toLocaleString()}` : "未設定";
        const thumbnailRaw =
          job.thumbnail_url ||
          job.eyecatch_image ||
          job.eyecatch_url ||
          job.eye_catch_image ||
          job.eye_catch_url ||
          job.image ||
          "";
        const thumbnail = String(thumbnailRaw || "").trim();
        const thumbnailEl = document.getElementById("job-thumbnail");

        // メタセクション表示
        setText("job-title", job.title);
        setText("job-category", category);
        setText("job-max-applicants", maxApplicants);
        setText("job-applicant-count", applicantCount);
        const remainingDays = calculateRemainingDays(job.deadline);
        setText("job-remaining-days", remainingDays);

        // 詳細セクション表示
        setText("job-title-detail", job.title);
        setText("job-category-detail", category);
        setText("job-remaining-days-detail", remainingDays);
        setText("job-hourly-wage", hourlyWage);
        setText("job-fee", job.fee);

        if (thumbnailEl) {
          if (thumbnail) {
            thumbnailEl.innerHTML = `<img src="${thumbnail.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\"/g, "&quot;").replace(/'/g, "&#39;")}" alt="${String(job.title || "案件サムネイル").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\"/g, "&quot;").replace(/'/g, "&#39;")}">`;
            thumbnailEl.classList.remove("job-thumbnail--placeholder");
          } else {
            thumbnailEl.innerHTML = "<span>NO IMAGE</span>";
            thumbnailEl.classList.add("job-thumbnail--placeholder");
          }
        }
      }

      async function loadJobDetail() {
        const session = loadSession();
        if (!session) { window.location.href = routes.login || "/"; return; }
        if (!jobId) { alert("案件IDが見つかりません。"); return; }

        try {
          const data = await jsonpRequest({ action: "listJobs", token: session.token }, apiTimeoutMs);
          if (!data.ok) {
            alert(readableApiError(data));
            return;
          }

          const jobs = Array.isArray(data.jobs) ? data.jobs : [];
          const job = jobs.find((item) => String(item.job_id || item.id || "") === String(jobId));
          if (!job) {
            alert("案件が見つかりませんでした。");
            return;
          }

          renderJob(job);
        } catch (err) {
          console.error(err);
          alert("通信エラーが発生しました。時間をおいて再度お試しください。");
        }
      }

      loadJobDetail();

      button.addEventListener("click", async () => {
        const session = loadSession();
        if (!session) { alert("セッションが無効です。ログインしてください。"); return; }

        const contactEmail = window.prompt("確認メールの送信先メールアドレスを入力してください");
        if (!contactEmail || !contactEmail.trim()) { alert("メールアドレスを入力してください。"); return; }
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(contactEmail.trim())) { alert("正しいメールアドレスを入力してください。"); return; }

        button.disabled = true;

        try {
          const data = await jsonpRequest(
            { action: "apply", token: session.token, jobId, contactEmail: contactEmail.trim() },
            apiTimeoutMs
          );

          if (!data.ok) {
            alert(readableApiError(data));
            button.disabled = false;
            return;
          }

          alert("応募が完了しました。確認メールをご確認ください。");
          const countEl = document.getElementById("job-applicant-count");
          if (countEl && data.applicantCount !== undefined && data.applicantCount !== null) {
            countEl.textContent = String(data.applicantCount);
          }

          // 最新の案件情報を再取得して応募者リストを更新
          await loadJobDetail();

        } catch (err) {
          console.error(err);
          alert("通信エラーが発生しました。時間をおいて再度お試しください。");
          button.disabled = false;
        }
      });
    });
  </script>
</body>
</html>

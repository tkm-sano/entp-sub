<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Content-Security-Policy" content="style-src 'self' 'unsafe-inline' https://www.gstatic.com https://fonts.googleapis.com; script-src 'self' 'unsafe-inline' https://translate.google.com https://translate.googleapis.com https://script.google.com https://script.googleusercontent.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://translate.googleapis.com;" />
    <title>{{ page.title | default: site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}" />
    <link rel="canonical" href="{{ page.url | absolute_url }}" />
    <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}" />

    <script>
      window.MENU_TALENT_ROUTES = {
        login: "{{ '/' | relative_url }}",
        jobs: "{{ '/jobs/' | relative_url }}"
      };
      window.MENU_TALENT_THUMBNAILS = [
        {% assign thumbnail_files = site.static_files | where_exp: "file", "file.path contains '/assets/thumbnails/images/'" %}
        {% for file in thumbnail_files %}
        {
          path: {{ file.path | relative_url | jsonify }},
          basename: {{ file.basename | jsonify }}
        }{% unless forloop.last %},{% endunless %}
        {% endfor %}
      ];
    </script>

    <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
  </head>

  <body data-page="{{ page.page_id | default: 'default' }}">
    {% unless page.page_id == "login" %}
    <header class="site-header">
      <div class="container">
        <h1>{{ site.title }}</h1>
      </div>
    </header>
    {% endunless %}

    <main class="container">{{ content }}</main>

    {% unless page.page_id == "login" %}
    <footer class="site-footer">
      <div class="container">
        <small>&copy; MissConnect</small>
      </div>
    </footer>
    {% endunless %}
  </body>
</html>
